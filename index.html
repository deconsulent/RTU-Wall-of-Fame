<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>RTU Wall of Fame AR</title>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- AR.js for webcam background -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- Vercel Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <script>
        // Component to keep wall always facing the user (Y-axis only billboard)
        AFRAME.registerComponent('billboard-y', {
            tick: function () {
                const cameraEl = document.getElementById('camera');
                if (!cameraEl) return;
                const camPos = new THREE.Vector3();
                cameraEl.object3D.getWorldPosition(camPos);
                // Look at camera but keep Y fixed to remain perfectly flat vertically
                this.el.object3D.lookAt(camPos.x, this.el.object3D.position.y, camPos.z);
            }
        });

        // Custom A-Frame component to drag and scale the AR wall
        AFRAME.registerComponent('touch-manipulate', {
            init: function () {
                this.wall = document.getElementById('wall-container');
                this.camera = document.getElementById('camera');
                this.touchStart = { x: 0, y: 0 };
                this.initialDist = 0;
                this.isDragging = false;
                this.isPinching = false;

                document.addEventListener('touchstart', (e) => {
                    if (!document.getElementById('ui-layer').classList.contains('hidden')) return;
                    if (e.target.closest('.hud-btn')) return; 
                    
                    if (e.touches.length === 1) {
                        this.isDragging = true;
                        this.isPinching = false;
                        this.touchStart.x = e.touches[0].clientX;
                        this.touchStart.y = e.touches[0].clientY;
                    } else if (e.touches.length === 2) {
                        this.isDragging = false;
                        this.isPinching = true;
                        this.initialDist = Math.hypot(
                            e.touches[0].clientX - e.touches[1].clientX,
                            e.touches[0].clientY - e.touches[1].clientY
                        );
                    }
                }, { passive: false });

                document.addEventListener('touchmove', (e) => {
                    if (!document.getElementById('ui-layer').classList.contains('hidden')) return;
                    e.preventDefault(); // Stop native scroll/zoom
                    
                    if (this.isDragging && e.touches.length === 1) {
                        const deltaX = e.touches[0].clientX - this.touchStart.x;
                        const deltaY = e.touches[0].clientY - this.touchStart.y;
                        
                        const s = 0.005; // Drag speed
                        
                        // Move wall relative to the camera's current perspective
                        const camRight = new THREE.Vector3(1, 0, 0);
                        camRight.applyQuaternion(this.camera.object3D.quaternion);
                        camRight.y = 0; // Keep horizontal movement perfectly flat
                        if (camRight.lengthSq() > 0) camRight.normalize();

                        const camUp = new THREE.Vector3(0, 1, 0); // Vertical movement

                        this.wall.object3D.position.add(camRight.multiplyScalar(deltaX * s));
                        this.wall.object3D.position.add(camUp.multiplyScalar(-deltaY * s));
                        
                        this.touchStart.x = e.touches[0].clientX;
                        this.touchStart.y = e.touches[0].clientY;
                    } else if (this.isPinching && e.touches.length === 2) {
                        const currentDist = Math.hypot(
                            e.touches[0].clientX - e.touches[1].clientX,
                            e.touches[0].clientY - e.touches[1].clientY
                        );
                        
                        if (this.initialDist > 0) {
                            const scaleDelta = currentDist / this.initialDist;
                            const currentScale = this.wall.object3D.scale.x;
                            let newScale = currentScale * scaleDelta;
                            
                            if (newScale < 0.2) newScale = 0.2;
                            if (newScale > 5.0) newScale = 5.0;
                            
                            this.wall.object3D.scale.set(newScale, newScale, newScale);
                        }
                        
                        this.initialDist = currentDist;
                    }
                }, { passive: false });

                document.addEventListener('touchend', (e) => {
                    if (e.touches.length === 0) {
                        this.isDragging = false;
                        this.isPinching = false;
                    } else if (e.touches.length === 1) {
                        this.isPinching = false;
                        this.isDragging = true;
                        this.touchStart.x = e.touches[0].clientX;
                        this.touchStart.y = e.touches[0].clientY;
                    }
                });
            }
        });
    </script>

    <style>
        :root {
            --cyan: #00f3ff;
            --cyan-glow: rgba(0, 243, 255, 0.5);
            --dark-bg: rgba(0, 10, 20, 0.85);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Share Tech Mono', monospace;
            background-color: #000;
            overflow: hidden; color: white;
            overscroll-behavior-y: contain; 
            touch-action: none; 
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 20, 40, 0.9),
                rgba(0, 20, 40, 0.9) 2px,
                rgba(0, 0, 0, 0.9) 2px,
                rgba(0, 0, 0, 0.9) 4px
            );
            backdrop-filter: blur(2px);
        }

        .hud-panel {
            background: rgba(0, 15, 30, 0.6);
            border-top: 2px solid var(--cyan);
            border-bottom: 2px solid var(--cyan);
            box-shadow: 0 0 30px var(--cyan-glow);
            padding: 40px;
            text-align: center;
            max-width: 85%;
            position: relative;
            transform: scale(0.95);
            animation: bootUp 0.5s ease-out forwards;
        }

        @keyframes bootUp {
            0% { opacity: 0; transform: scale(1.1); filter: contrast(2); }
            100% { opacity: 1; transform: scale(1); filter: contrast(1); }
        }

        .hidden { display: none !important; }

        h1 {
            font-size: 26px; font-weight: bold;
            color: var(--cyan); letter-spacing: 4px;
            margin: 0 0 15px 0;
            text-shadow: 0 0 15px var(--cyan-glow);
        }

        p {
            font-size: 14px; color: #a0e8ff;
            line-height: 1.8; margin: 0 0 30px 0;
            text-transform: uppercase;
        }

        .btn {
            background: transparent;
            color: var(--cyan);
            border: 1px solid var(--cyan);
            padding: 12px 30px;
            font-size: 18px; font-family: 'Share Tech Mono', monospace; 
            cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 10px var(--cyan-glow), inset 0 0 10px var(--cyan-glow);
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--cyan); color: #000;
            box-shadow: 0 0 30px var(--cyan);
        }

        .btn:active { transform: scale(0.95); }

        .radar {
            width: 50px; height: 50px; border-radius: 50%;
            border: 1px dashed var(--cyan);
            margin: 0 auto 20px auto; position: relative;
        }
        .radar::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 50%; height: 2px; background: var(--cyan);
            transform-origin: 0% 50%; animation: scan 1.5s linear infinite;
        }
        @keyframes scan { 100% { transform: rotate(360deg); } }

        #hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: flex-start;
            pointer-events: none; z-index: 5;
        }

        .hud-btn {
            background: rgba(0, 10, 20, 0.8); border: 1px solid var(--cyan);
            color: var(--cyan); padding: 8px 16px; font-family: 'Share Tech Mono', monospace;
            font-size: 14px; cursor: pointer; pointer-events: auto; text-transform: uppercase;
            box-shadow: 0 0 10px var(--cyan-glow);
        }

        #drag-hint {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            font-size: 12px; color: var(--cyan);
            background: rgba(0, 10, 20, 0.8); padding: 10px 20px; border: 1px solid var(--cyan);
            pointer-events: none; opacity: 0.8; text-align: center;
            line-height: 1.5; z-index: 5;
        }
    </style>
</head>
<body>

    <!-- A-Frame Scene -->
    <a-scene 
        touch-manipulate
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: true"
        loading-screen="enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;"
        style="display: none;" id="ar-scene">
        
        <a-entity id="camera" camera look-controls="pointerLockEnabled: false"></a-entity>

        <!-- Wall Container - Now features billboard-y to always face camera -->
        <a-entity id="wall-container" visible="false" billboard-y>
            <!-- Futuristic Title -->
            <a-text value="[ RTU WALL OF FAME ]" position="0 2.0 0" align="center" width="9" font="monoid" color="#00e5ff" opacity="1.0"></a-text>
            <a-text id="zone-subtitle" value="Initializing..." position="0 1.7 0" align="center" width="5" font="monoid" color="#ffffff" opacity="0.8"></a-text>
            
            <a-plane width="7" height="0.01" position="0 1.5 0" color="#00e5ff" opacity="0.6" material="transparent: true; shader: flat;"></a-plane>
            
            <!-- Cards Container -->
            <a-entity id="cards-container" position="0 -0.5 0"></a-entity>
        </a-entity>
    </a-scene>

    <!-- UI Layer -->
    <div id="ui-layer">
        <div class="hud-panel" id="locating-panel">
            <div class="radar"></div>
            <h1>SYSTEM ALIGNMENT</h1>
            <p>> ACQUIRING GPS LOCK...<br>> SEARCHING FOR ZONES...</p>
            <button class="btn" id="start-btn">INITIALIZE</button>
        </div>

        <div class="hud-panel hidden" id="calibration-panel">
            <div style="font-size: 40px; color: var(--cyan); margin-bottom: 15px;">⌖</div>
            <h1 id="found-zone-title">ZONE LOCKED</h1>
            <p>> TARGET ACQUIRED.<br>> POINT CAMERA AT WALL.<br>> ENGAGE DEPLOYMENT.</p>
            <button class="btn" id="spawn-btn">DEPLOY WALL</button>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud" class="hidden">
        <div></div> <!-- spacer -->
        <button class="hud-btn" id="recalibrate-btn">[ ABORT / RECALIBRATE ]</button>
    </div>
    
    <div id="drag-hint" class="hidden">
        [ 1 FINGER: DRAG TO MOVE ]<br>[ 2 FINGERS: PINCH TO SCALE ]
    </div>

    <script>
        const uiLayer = document.getElementById('ui-layer');
        const locatingPanel = document.getElementById('locating-panel');
        const calibrationPanel = document.getElementById('calibration-panel');
        const startBtn = document.getElementById('start-btn');
        const spawnBtn = document.getElementById('spawn-btn');
        const arScene = document.getElementById('ar-scene');
        const wallContainer = document.getElementById('wall-container');
        const cardsContainer = document.getElementById('cards-container');
        const zoneSubtitle = document.getElementById('zone-subtitle');
        const hud = document.getElementById('hud');
        const recalibrateBtn = document.getElementById('recalibrate-btn');
        const dragHint = document.getElementById('drag-hint');

        let currentZoneData = null;

        async function fetchZoneData() {
            try {
                const response = await fetch('data.json');
                if(!response.ok) throw new Error("Local fetch failed");
                const data = await response.json();
                return data.zones[0];
            } catch (e) {
                console.warn("Could not fetch data.json, using fallback data", e);
                return {
                    name: "Hackathons 2026",
                    events: [{
                        title: "RTU Global Hackathon",
                        winners: [
                            { rank: 1, team: "AeroVision", award: "Grand Winner", description: "Forest-aware UAV exploration.", color: "#f59e0b" },
                            { rank: 2, team: "UrbanDine Sky", award: "Best Pitch", description: "Autonomous urban food-air delivery.", color: "#9ca3af" },
                            { rank: 3, team: "VoltPath", award: "Tech Excellence", description: "Battery routing optimization.", color: "#b45309" }
                        ]
                    }]
                };
            }
        }

        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            locatingPanel.querySelector('p').innerHTML = "> ACQUIRING GPS LOCK...<br>> PLEASE WAIT...";
            
            setTimeout(async () => {
                currentZoneData = await fetchZoneData();
                locatingPanel.classList.add('hidden');
                calibrationPanel.classList.remove('hidden');
                document.getElementById('found-zone-title').innerText = currentZoneData.name;
                arScene.style.display = 'block';
            }, 1000);
        });

        spawnBtn.addEventListener('click', () => {
            uiLayer.classList.add('hidden');
            hud.classList.remove('hidden');
            dragHint.classList.remove('hidden');

            buildARCards(currentZoneData);
            
            // Spawn EXACTLY 4 meters in front of the user's CURRENT camera view
            const cameraEl = document.getElementById('camera');
            const camPos = new THREE.Vector3();
            cameraEl.object3D.getWorldPosition(camPos);
            
            const camDir = new THREE.Vector3();
            cameraEl.object3D.getWorldDirection(camDir);
            camDir.y = 0; // Keep horizontal
            if (camDir.lengthSq() > 0) camDir.normalize();

            const spawnDistance = 4.0;
            const spawnPos = camPos.clone().add(camDir.multiplyScalar(spawnDistance));

            wallContainer.object3D.position.copy(spawnPos);
            wallContainer.setAttribute('scale', '1 1 1');
            wallContainer.setAttribute('visible', 'true');
        });

        recalibrateBtn.addEventListener('click', () => {
            hud.classList.add('hidden');
            dragHint.classList.add('hidden');
            uiLayer.classList.remove('hidden');
            calibrationPanel.classList.remove('hidden');
            wallContainer.setAttribute('visible', 'false');
        });

        function buildARCards(zone) {
            cardsContainer.innerHTML = '';
            if(!zone.events || zone.events.length === 0) return;
            const event = zone.events[0];
            zoneSubtitle.setAttribute('value', `// EVENT: ${event.title.toUpperCase()} //`);

            const winners = event.winners;
            const cardWidth = 1.6;
            const cardHeight = 2.4;
            const spacing = 1.8;
            const startX = -((winners.length - 1) * spacing) / 2;

            winners.forEach((winner, index) => {
                const xPos = startX + (index * spacing);
                const card = document.createElement('a-entity');
                card.setAttribute('position', `${xPos} 0 0`);

                const grid = document.createElement('a-entity');
                grid.setAttribute('geometry', `primitive: plane; width: ${cardWidth}; height: ${cardHeight}; segmentsWidth: 4; segmentsHeight: 6`);
                grid.setAttribute('material', 'color: #00e5ff; wireframe: true; wireframeLinewidth: 1; opacity: 0.15; shader: flat; transparent: true;');
                grid.setAttribute('position', '0 0 -0.05');

                const borderTop = document.createElement('a-plane');
                borderTop.setAttribute('width', cardWidth);
                borderTop.setAttribute('height', '0.02');
                borderTop.setAttribute('position', `0 ${cardHeight/2} 0`);
                borderTop.setAttribute('color', '#00e5ff');
                borderTop.setAttribute('opacity', '0.9');
                borderTop.setAttribute('material', 'transparent: true; shader: flat;');
                
                const borderBottom = document.createElement('a-plane');
                borderBottom.setAttribute('width', cardWidth);
                borderBottom.setAttribute('height', '0.02');
                borderBottom.setAttribute('position', `0 -${cardHeight/2} 0`);
                borderBottom.setAttribute('color', '#00e5ff');
                borderBottom.setAttribute('opacity', '0.9');
                borderBottom.setAttribute('material', 'transparent: true; shader: flat;');

                const rankText = document.createElement('a-text');
                rankText.setAttribute('value', `[ #${winner.rank} ]`);
                rankText.setAttribute('position', `0 0.9 0.05`);
                rankText.setAttribute('align', 'center');
                rankText.setAttribute('width', '6');
                rankText.setAttribute('color', '#00e5ff');
                rankText.setAttribute('font', 'monoid');

                const teamText = document.createElement('a-text');
                teamText.setAttribute('value', winner.team);
                teamText.setAttribute('position', `0 0.5 0.05`);
                teamText.setAttribute('align', 'center');
                teamText.setAttribute('width', '5.5');
                teamText.setAttribute('color', '#ffffff');
                teamText.setAttribute('font', 'monoid');

                const awardText = document.createElement('a-text');
                awardText.setAttribute('value', `> ${winner.award.toUpperCase()} <`);
                awardText.setAttribute('position', `0 0.1 0.05`);
                awardText.setAttribute('align', 'center');
                awardText.setAttribute('width', '3.5');
                awardText.setAttribute('color', '#00e5ff');
                awardText.setAttribute('opacity', '0.9');
                awardText.setAttribute('font', 'monoid');

                const separator = document.createElement('a-plane');
                separator.setAttribute('width', cardWidth * 0.6);
                separator.setAttribute('height', '0.005');
                separator.setAttribute('position', `0 -0.15 0.02`);
                separator.setAttribute('color', '#00e5ff');
                separator.setAttribute('opacity', '0.5');
                separator.setAttribute('material', 'transparent: true; shader: flat;');

                const descText = document.createElement('a-text');
                descText.setAttribute('value', winner.description);
                descText.setAttribute('position', `0 -0.25 0.05`);
                descText.setAttribute('align', 'center');
                descText.setAttribute('width', '1.4'); 
                descText.setAttribute('wrap-count', '22'); 
                descText.setAttribute('line-height', '60'); 
                descText.setAttribute('color', '#a0e8ff');
                descText.setAttribute('opacity', '0.9');
                descText.setAttribute('font', 'monoid');
                descText.setAttribute('baseline', 'top'); 

                card.appendChild(grid);
                card.appendChild(borderTop);
                card.appendChild(borderBottom);
                card.appendChild(rankText);
                card.appendChild(teamText);
                card.appendChild(awardText);
                card.appendChild(separator);
                card.appendChild(descText);

                cardsContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
